<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" onload="this.onload=null;this.rel='stylesheet'">

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#050510" />
    <meta name="description" content="Task Shredder AI — Break any big goal into 5 focused Pomodoro steps using Groq AI. Built for Telegram." />
    <!-- Open Graph -->
    <meta property="og:title" content="Task Shredder AI" />
    <meta property="og:description" content="Break any overwhelming goal into 5 actionable Pomodoro sessions powered by Groq AI." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://i.ibb.co/0GzqfB6/focusflow-banner.png" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Task Shredder AI" />
    <meta name="twitter:description" content="Break any goal into 5 focused Pomodoro steps with AI." />
    <meta name="twitter:image" content="https://i.ibb.co/0GzqfB6/focusflow-banner.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Task Shredder AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
